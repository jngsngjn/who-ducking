  <script>
    function changeButtonToDuplicateCheck(button) {
      if (button.innerHTML === "변 경") {
        // 새 중복확인 버튼 생성
        const duplicateButton = document.createElement("button");
        duplicateButton.innerHTML = "중복확인";
        duplicateButton.className = "check";
        duplicateButton.onclick = function () {
          checkDuplicate(duplicateButton);
        };

        // 기존 버튼을 새 버튼으로 교체
        button.parentNode.replaceChild(duplicateButton, button);
      }
    }

    function checkDuplicate(button) {
      const inputValue = button.previousElementSibling.value;
      console.log(`중복확인: ${inputValue}`);
      // 여기에 중복 확인 로직을 추가
      alert(`중복 확인: ${inputValue}`);
    }

    function showVerificationCode() {
      // 인증번호 ul 요소를 보여줌
      const verificationUl = document.getElementById('verification-code');
      verificationUl.style.display = 'block';
    }

    function selectGender(button) {
      // 모든 버튼의 선택된 스타일 제거
      const buttons = document.querySelectorAll('.gender');
      buttons.forEach(btn => btn.classList.remove('selected'));

      // 클릭된 버튼에 선택된 스타일 추가
      button.classList.add('selected');
    }

    function updateStyledText(input) {
      const styledText = document.getElementById(input.id + '-styled');
      if (input.value) {
        styledText.style.display = 'none';
      } else {
        styledText.style.display = 'block';
      }
    }
    // ----------------------------------------------------

    function execDaumPostcode() {
      new daum.Postcode({
        oncomplete: function (data) {
          // 팝업을 통한 검색 결과 항목 클릭 시 실행
          var addr = ''; // 주소_결과값이 없을 경우 공백 
          var extraAddr = ''; // 참고항목

          //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
          if (data.userSelectedType === 'R') { // 도로명 주소를 선택
            addr = data.roadAddress;
          } else { // 지번 주소를 선택
            addr = data.jibunAddress;
          }

          if (data.userSelectedType === 'R') {
            if (data.bname !== '' && /[동|로|가]$/g.test(data.bname)) {
              extraAddr += data.bname;
            }
            if (data.buildingName !== '' && data.apartment === 'Y') {
              extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
            }
            if (extraAddr !== '') {
              extraAddr = ' (' + extraAddr + ')';
            }
          } else {
            document.getElementById("UserAdd1").value = '';
          }

          // 선택된 우편번호와 주소 정보를 input 박스에 넣는다.
          document.getElementById('postcode').value = data.zonecode;
          document.getElementById("address").value = addr;
          document.getElementById("address").value += extraAddr;
          document.getElementById("address-detail").focus(); // 우편번호 + 주소 입력이 완료되었음으로 상세주소로 포커스 이동
        }
      }).open();
    }
  </script>
