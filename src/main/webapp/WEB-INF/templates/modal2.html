<body>
    <div th:insert="~{fragments/header :: header}"></div>

    <div class="line"></div>
    <h2>프로필 수정</h2>
    <div class="container">
        <form th:action="@{/myPage/{userId}/edit(userId=${loginUser.getId()})}" method="post"
            enctype="multipart/form-data" onsubmit="return validateForm()">

            <div class="profile-image">
                <img class="profile-img" id="profileImagePreview"
                    th:src="${loginUser.profileImage != null ? '/image/profile/' + loginUser.profileImage.storeImageName : ''}"
                    alt="Profile Image" style="display: none;" />
                <img class="profile-img" id="levelImagePreview"
                    th:src="@{'/image/level/' + ${loginUser.level.imageName}}" alt="Level Image"
                    style="display: none;" />
            </div>
            <input type="file" id="profileImageInput" name="profileImage" accept="image/*">
            <button type="button" id="useDefaultImage" style="display: none;">기본 이미지 사용</button>
            <input type="hidden" id="useDefaultImageFlag" name="useDefaultImage"
                th:value="${loginUser.profileImage == null ? 'true' : 'false'}">

            <ul>
                <ul>
                    <li class="name">닉네임</li>
                    <li class="box">
                        <input type="text" id="currentNickname" name="nickname" class="text"
                            th:value="${loginUser.getNickname()}" readonly>
                        <button class="check" type="button" id="changeNicknameButton">변 경</button>
                    </li>
                </ul>

                <ul>
                    <li class="name">이메일</li>
                    <li class="box">
                        <input type="email" class="text" th:value="${loginUser.getEmail()}" readonly>
                        <div class="image">

                            <i class="fas fa-lock icon"></i>
                        </div>
                    <li class="email">
                        <!-- 체크박스와 텍스트를 연결하기 위해 label 사용 -->
                        <label class="email-label">이메일 수신여부
                            <input type="checkbox" class="email-checkbox">
                            <span class="checkbox-icon"></span>
                        </label>
                    </li>
                </ul>

                <ul>
                    <li class="name">전화번호</li>
                    <li class="box">
                        <input type="number" id="phone" class="text" name="phone" th:value="${loginUser.phone}"
                            readonly>
                        <button type="button" id="changePhoneButton" class="check" onclick="changePhone(this)">변
                            경</button>
                    </li>
                </ul>

                <ul id="verification-code" class="hidden">
                    <li class="name">인증번호</li>
                    <li class="box">
                        <input type="number" id="verificationInput" class="text">
                        <button type="button" id="checkCodeButton" class="check" onclick="verifyCode()">인증번호 확인</button>
                    </li>
                </ul>

                <ul>

                    <li class="name">성별</li>
                    <li class="gender-select">
                        <input type="radio" id="male" name="gender" value="MALE"
                            th:checked="${loginUser.gender == T(hello.entity.user.Gender).MALE}" />
                        <label for="male">남</label>
                        <input type="radio" id="female" name="gender" value="FEMALE"
                            th:checked="${loginUser.gender == T(hello.entity.user.Gender).FEMALE}" />
                        <label for="female">여</label>
                    </li>

                </ul>


                <ul>
                    <li class="name">선호 애니 장르
                        <button type="button" id="showGenreModal" class="check-genre">장르 변경</button>
                    </li>
                    <li id="selected-genres" th:each="userGenre : ${loginUser.userGenres}">

                       

                        <div class="genre-like-row">
                            <div class="genre-like-item">

                                <label th:text="${userGenre.genre.name}" class="label-like">추리미스테리</label>

                            </div>
                            <div class="genre-like-item">

                                <label th:text="${userGenre.genre.name}" class="label-like">역하렘</label>

                            </div>

                        </div>

                    </li>
                    <li>





                    </li>
                </ul>


            </ul>
            <!-- 모달 구조 -->
            <div id="genreModal" class="modal">
                <div class="modal-content">
                    <span class="close" id="closeGenreModal">&times;</span>

                    <div class="genre-selection">
                        <div class="genre-container">
                            <div class="genre-header">
                                <div class="genre-title">애니 장르 선택</div>
                                <div class="genre-subtitle">최대 5개 선택가능</div>
                            </div>
                            <div class="genre-list">
                                <div class="genre-row">
                                    <div class="genre-item">
                                        <input type="checkbox" id="custom_button_action" name="genre" value="액션"
                                            class="checkbox_class" />
                                        <label for="custom_button_action" id="custom_button_action_label"
                                            class="checkbox_label">액션</label>
                                    </div>
                                    <div class="genre-item">
                                        <input type="checkbox" id="custom_button_munchkin" name="genre" value="먼치킨"
                                            class="checkbox_class" />
                                        <label for="custom_button_munchkin" id="custom_button_munchkin_label"
                                            class="checkbox_label">먼치킨</label>
                                    </div>
                                    <div class="genre-item">
                                        <input type="checkbox" id="custom_button_mystery" name="genre" value="추리 미스테리"
                                            class="checkbox_class" />
                                        <label for="custom_button_mystery" id="custom_button_mystery_label"
                                            class="checkbox_label">추리 미스테리</label>

    <script>
        $(document).ready(function () {

            let profileImagePreview = $('#profileImagePreview');
            let levelImagePreview = $('#levelImagePreview');
            let useDefaultImageButton = $('#useDefaultImage');

            // 초기 상태 설정
            // 사용 중인 프사가 없을 때
            if (!profileImagePreview.attr('src') || profileImagePreview.attr('src') === '') {
                profileImagePreview.hide();
                levelImagePreview.show();
                useDefaultImageButton.hide();
            } else {
                // 사용 중인 프사가 있을 때
                profileImagePreview.show();
                levelImagePreview.hide();
                useDefaultImageButton.show();
            }

            // 사진을 업로드했을 때
            $('#profileImageInput').on('change', function (event) {
                let file = event.target.files[0];
                if (file) {
                    let reader = new FileReader();
                    reader.onload = function (e) {
                        $('#profileImagePreview').attr('src', e.target.result).show();
                        $('#levelImagePreview').hide();
                        $('#useDefaultImageFlag').val('false');
                        useDefaultImageButton.show();
                    }
                    reader.readAsDataURL(file);
                }
            });

            // 기본 이미지 버튼을 클릭했을 때
            $('#useDefaultImage').on('click', function () {
                let useDefaultImage = $('#useDefaultImageFlag').val();

                // 이미 기본 이미지를 사용 중이라면 AJAX 요청을 보내지 않음
                if (useDefaultImage !== 'true') {
                    $.ajax({
                        url: '/myPage/user/level-image',
                        type: 'POST',
                        success: function (data) {
                            let defaultImagePath = '/image/level/' + data;
                            $('#profileImagePreview').attr('src', defaultImagePath).show();
                            $('#levelImagePreview').hide();
                            $('#profileImageInput').val('');
                            $('#useDefaultImageFlag').val('true');
                            useDefaultImageButton.hide();
                        },
                        error: function (xhr, status, error) {
                            alert('기본 이미지 로드에 실패했습니다.');
                        }
                    });
                }
            });
        });

        // 닉네임
        let duplicateChecked = true;
        $(document).ready(function () {
            const currentNickname = $('#currentNickname').val();

            $('#changeNicknameButton').on('click', function () {
                let $button = $(this);
                let $inputField = $button.siblings('input[type="text"]');

                if ($button.text() === "변 경") {
                    duplicateChecked = false;

                    // input 필드 readonly 속성 제거
                    $inputField.prop("readonly", false);

                    // 새 중복확인 버튼 생성
                    let $duplicateButton = $('<button>', {
                        type: 'button',
                        text: '중복 확인',
                        class: 'check',
                        click: checkDuplicate
                    });

                    // 기존 버튼을 숨기고 새 버튼을 추가
                    $button.hide();
                    $button.parent().append($duplicateButton);
                }
            });

            function checkDuplicate() {
                let $button = $(this);
                let inputValue = $button.siblings('input[type="text"]').val();

                if (inputValue === currentNickname) {
                    alert("기존 닉네임과 동일합니다.");
                    duplicateChecked = false;
                    return;
                }

                if (inputValue === "") {
                    alert("닉네임을 입력해주세요.");
                    duplicateChecked = false;
                    return;
                }

                if (inputValue.length < 2 || inputValue.length > 12) {
                    alert("닉네임은 2자에서 12자 사이여야 합니다.");
                    duplicateChecked = false;
                    return;
                }

                let regex = /^[가-힣a-zA-Z0-9]+$/;
                if (!regex.test(inputValue)) {
                    alert("닉네임은 한글, 영어, 숫자만 사용할 수 있습니다.");
                    duplicateChecked = false;
                    return;
                }

                $.ajax({
                    url: "/register/check-duplicate-nickname",
                    type: "POST",
                    data: { nickname: inputValue },
                    success: function (response) {
                        if (response) {
                            if (confirm("사용 가능한 닉네임입니다. 사용하시겠습니까?")) {
                                // 사용 버튼을 클릭한 경우
                                $("#currentNickname").prop("readonly", true);
                                $button.remove();
                                $('#changeNicknameButton').show();
                                duplicateChecked = true;
                            }
                        } else {
                            alert("이미 사용 중인 닉네임입니다.");
                            duplicateChecked = false;
                        }
                    },
                    error: function () {
                        alert("중복 확인 중 오류가 발생했습니다.");
                        duplicateChecked = false;
                    }
                });
            }
        });

        // 전화번호
        let verifyPhone = true;
        $(document).ready(function () {
            const currentPhone = $('#phone').val();

            window.changePhone = function (button) {
                let $button = $(button);
                if ($button.text() === "변 경") {
                    let $inputField = $button.prev('input');
                    $inputField.prop('readonly', false);

                    let $verifyButton = $('<button>', {
                        type: 'button',
                        text: '인증 번호 전송',
                        class: 'check',
                        id: 'sendCodeButton',
                        click: function () {
                            sendCode($inputField.val(), currentPhone);
                        }
                    });

                    $button.replaceWith($verifyButton);
                    $inputField.on('input', function () {
                        if (this.value.length > 11) {
                            this.value = this.value.slice(0, 11);
                        }
                    });
                }
            }

            window.sendCode = function (input, currentPhone) {
                if (input === currentPhone) {
                    alert("기존 전화번호와 동일합니다.");
                    return;
                }

                if (input === "") {
                    alert("전화번호를 입력해 주세요.");
                    return;
                }

                const regex = /^010\d{8}$/;
                if (!regex.test(input)) {
                    alert("전화번호 형식이 올바르지 않습니다.");
                    return;
                }

                $.ajax({
                    type: "POST",
                    url: "/register/send-code",
                    contentType: "text/plain;charset=UTF-8",
                    data: input,
                    success: function (result) {
                        if (result.isDuplicate) {
                            alert("사용할 수 없는 번호입니다.");
                        } else {
                            alert("인증 코드가 발송되었습니다.");
                            $('#verification-code').show();
                            $("#changePhoneFlag").val("true");
                            verifyPhone = false;
                        }
                    },
                    error: function () {
                        alert("인증 코드 발송에 실패했습니다.");
                    }
                });
            }

            window.verifyCode = function () {
                const verificationCode = $('#verificationInput').val();
                const phone = $('#phone').val();

                if (verificationCode === "") {
                    alert("인증번호를 입력해 주세요.");
                    verifyPhone = false;
                    return;
                }

                $.ajax({
                    type: "POST",
                    url: "/register/verify-code",
                    contentType: "application/json;charset=UTF-8",
                    data: JSON.stringify({ phone: phone, code: verificationCode }),
                    success: function (response) {
                        if (response === true) {
                            alert("인증이 성공적으로 완료되었습니다.");
                            $("#phone").prop("readonly", true);
                            $("#verificationInput").prop("readonly", true);
                            $("#checkCodeButton").hide();
                            $("#sendCodeButton").hide();
                            verifyPhone = true;
                        } else {
                            alert("인증 실패. 다시 시도해 주세요.");
                            verifyPhone = false;
                        }
                    },
                    error: function () {
                        alert("인증번호 확인 중 오류가 발생했습니다.");
                        verifyPhone = false;
                    }
                });
            }

            // 입력 필드에 숫자 4자리 제한 추가
            $('#verificationInput').on('input', function () {
                if (this.value.length > 4) {
                    this.value = this.value.slice(0, 4);
                }
            });
        });

        function selectGender(button) {
            // 모든 버튼의 선택된 스타일 제거
            const buttons = document.querySelectorAll('.gender');
            buttons.forEach(btn => btn.classList.remove('selected'));

            // 클릭된 버튼에 선택된 스타일 추가
            button.classList.add('selected');
        }

        function updateStyledText(input) {
            const styledText = document.getElementById(input.id + '-styled');
            if (input.value) {
                styledText.style.display = 'none';
            } else {
                styledText.style.display = 'block';
            }
        }
        // ----------------------------------------------------

        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function (data) {
                    // 팝업을 통한 검색 결과 항목 클릭 시 실행
                    var addr = ''; // 주소_결과값이 없을 경우 공백
                    var extraAddr = ''; // 참고항목

                    //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
                    if (data.userSelectedType === 'R') { // 도로명 주소를 선택
                        addr = data.roadAddress;
                    } else { // 지번 주소를 선택
                        addr = data.jibunAddress;
                    }

                    if (data.userSelectedType === 'R') {
                        if (data.bname !== '' && /[동|로|가]$/g.test(data.bname)) {
                            extraAddr += data.bname;
                        }
                        if (data.buildingName !== '' && data.apartment === 'Y') {
                            extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                        }
                        if (extraAddr !== '') {
                            extraAddr = ' (' + extraAddr + ')';
                        }
                    } else {
                        document.getElementById("UserAdd1").value = '';
                    }

                    // 선택된 우편번호와 주소 정보를 input 박스에 넣는다.
                    document.getElementById('postcode').value = data.zonecode;
                    document.getElementById("address").value = addr;
                    document.getElementById("address").value += extraAddr;
                    document.getElementById("address-detail").focus(); // 우편번호 + 주소 입력이 완료되었음으로 상세주소로 포커스 이동
                }
            }).open();
        }

        // 폼 제출 검증
        function validateForm() {
            if (!duplicateChecked) {
                alert("닉네임 중복 검사를 완료해 주세요.");
                return false;
            }

            if (!verifyPhone) {
                alert("전화번호 인증을 완료해 주세요.");
                return false;
            }

            const postcode = $('#postcode').val();
            const detailAddress = $('#detail-address').val();

            if (postcode && detailAddress === "") {
                alert("상세 주소를 입력해 주세요.");
                return false;
            }

            return true;
        }

            $(window).click(function (event) {

        function applyLabelStyles() {

            var text = $(this).text();
            if (text.length >= 4) {
                $(this).css('font-size', '18px'); // 글자 수가 4자 이상일 때 글자 크기를 18px로 조정

                '<div style="display: flex; justify-content: center;">' + 
                text.slice(0, 3) + 
                '</div><div style="display: flex; justify-content: center;">' + 
                text.slice(3) + 
                '</div>'
                );
            }
        });
    }
});

                '</div><div style="display: flex; justify-content: center;">' + 
                text.slice(2) + 
                '</div>'
            ); // 4번째 글자부터 줄넘김하여 중앙 정렬된 HTML로 변경
        }
    });
    </script>
</body>
