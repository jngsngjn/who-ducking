<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            font-family: 'JejuGothic-Regular', sans-serif;
        }

        .genre-selection {
            background: #ededed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .genre-container {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #d9d9d9;
            width: 850px;
            height: 1600px;
            box-shadow: 0px 8px 8px 0px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .genre-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 100px;
        }

        .genre-title {
            color: #ff8b00;
            font-size: 48px;
            font-weight: 400;
        }

        .genre-subtitle {
            color: #ffc60b;
            font-size: 24px;
            font-weight: 400;
        }

        .genre-list {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 785px;
            height: 1020px;
            margin: 159px 0 50px 0;
        }

        .genre-row {
            display: flex;
            gap: 33px;
            justify-content: center;
            margin-bottom: 100px;
            width: 785px;
        }

        .genre-item {
            width: auto;
            height: 60px;
            text-align: center;
        }

        .genre-btn {
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #d9d9d9;
            color: #d9d9d9;
            font-size: 20px;
            padding: 10px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: background 0.3s, color 0.3s;
        }

        .genre-btn:hover {
            background: #ff8b00;
            color: #fff;
        }

        .genre-submit {
            width: 650px;
            height: 75px;
        }

        .submit-btn {
            background: #ff8b00;
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 36px;
            padding: 10px;
            width: 650px;
            height: 75px;
            cursor: pointer;
            margin-bottom: 100px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #ff6f00;
        }

        .secion-footer {
            background: #f8f8f8;
            padding: 20px;
            text-align: center;
        }

        .blackframe {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-black-1 {
            width: 100px;
        }

        .footer-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-link {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            color: #333;
            cursor: pointer;
            font-size: 12px;
        }

        .footer-link:hover {
            color: #ff8b00;
        }

        .footer-team span {
            color: #757575;
            font-size: 12px;
            margin-right: 5px;
        }

        .team-name {
            color: #333;
            cursor: pointer;
        }

        .reserved {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .github-1 {
            width: 30px;
            margin-top: 10px;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            padding: 10px 20px;
            border-bottom: 1px solid #d9d9d9;
        }

        .right,
        .left {
            display: flex;
            align-items: center;
        }

        .menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-bar {
            display: flex;
            gap: 20px;
            cursor: pointer;
        }

        .header-bar p {
            margin: 0;
            color: #333;
            cursor: pointer;
        }

        .header-bar p:hover {
            color: #ff8b00;
        }

        .alarm-check {
            display: flex;
            align-items: center;
            gap: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ff8b00;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color: #fff;
        }

        .logo {
            width: 100px;

        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f0f0f0;
            border-radius: 10px;
            padding: 5px;
        }

        .search-input {
            width: 200px;
            height: 20px;
            border: none;
            outline: none;
            border-radius: 5px;
            padding: 5px;
        }

        .rectangle-7 {
            width: 200px;
            height: 30px;
            background: #fff;
            border-radius: 10px;
        }

        .frame {
            width: 20px;
        }

        .profile {
            width: 30px;
            margin-left: 20px;
        }

        .github1 {
            width: 20px;
            margin-top: 10px;
        }

        /* -------------------------------------------- */

        .checkbox_class {
            display: none;
        }

        .checkbox_label {
            color: #d9d9d9;
            background-color: white;
            border: 1px solid #d9d9d9;
            border-radius: 20px;
            font-size: 30px;
            width: auto;
            min-width: 150px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            padding: 0 10px;
        }

        .checkbox_label:hover {
            background-color: #feffdb;
            cursor: pointer;
        }

        .checkbox_label_click {
            color: #FFFFFF;
            background-color: #ff8b00;
            border: 1px solid #ff8b00;
            border-radius: 20px;
            font-size: 30px;
            width: auto;
            min-width: 150px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            padding: 0 10px;
        }

        .checkbox_label_click:hover {
            cursor: pointer;
        }

        
    </style>
</head>

    </body>
    <script>
        // 체크박스 가져오기
        const checkboxes = document.querySelectorAll('.checkbox_class');

        checkboxes.forEach((checkbox) => {
            checkbox.addEventListener('click', (e) => {
                const label = document.getElementById(e.target.id + "_label");
                if (e.target.checked == true) {
                    label.classList.replace('checkbox_label', 'checkbox_label_click');
                } else {
                    label.classList.replace('checkbox_label_click', 'checkbox_label');
                }
            });
        });
    </script>
